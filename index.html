<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Floorplanner PWA</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2c2416" />

  <!-- Icons -->
  <link rel="icon" href="./favicon.ico" />

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css" />

  <!-- React (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (för JSX i browsern) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <!-- App code -->
  <script type="text/babel" data-presets="react">
    /* ===== App.jsx (INLINE FÖR TEST) ===== */

    function App() {
      return (
        <div style={{
          padding: "40px",
          fontFamily: "Georgia, serif",
          background: "#faf6ef",
          minHeight: "100vh"
        }}>
          <h1>✅ React + JSX fungerar</h1>
          <p>
            GitHub Pages kör nu React korrekt via Babel.
          </p>
          <p>
            Nästa steg: stoppa in hela floorplanner‑appen.
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
